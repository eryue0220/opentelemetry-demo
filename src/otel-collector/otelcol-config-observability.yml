# Observability stack collector additions: Jaeger, Prometheus, and OpenSearch exporters,
# and OpAMP status reporting.
# Loaded when running with compose.observability.yaml.
#
# IMPORTANT: The OTel Collector merges config files but REPLACES arrays, not appends.
# The pipeline exporters below must repeat all exporters from earlier config layers
# (e.g. debug, spanmetrics) to keep them active alongside the observability exporters.
#
# Exporter name reference (these are the stable names forks should reference):
#   traces:  otlp_grpc/jaeger
#   metrics: otlp_http/prometheus
#   logs:    opensearch
#
# If you are running with compose.full.yaml, also repeat the full receivers in metrics.

exporters:
  otlp_grpc/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true
    sending_queue:
      batch:
  otlp_http/prometheus:
    endpoint: "http://prometheus:9090/api/v1/otlp"
    tls:
      insecure: true
    sending_queue:
      batch:
  opensearch:
    logs_index: otel-logs
    logs_index_time_format: "yyyy-MM-dd"
    http:
      endpoint: "http://opensearch:9200"
      tls:
        insecure: true
    sending_queue:
      batch:
  otlp_grpc/firepit:
    endpoint: "firepit:4317"
    tls:
      insecure: true

extensions:
  opamp:
    server:
      ws:
        endpoint: wss://opamp-server:4320/v1/opamp
        tls:
          insecure_skip_verify: true
    instance_uid: 00000000-0000-7000-8000-000000000001
    capabilities:
      reports_effective_config: true
      reports_health: true
      reports_available_components: true
    agent_description:
      include_resource_attributes: true
      non_identifying_attributes:
        deployment.environment.name: demo
        demo.collector.role: gateway

service:
  extensions: [opamp]
  pipelines:
    traces:
      exporters: [debug, otlp_grpc/jaeger, span_metrics]
    metrics:
      exporters: [debug, otlp_http/prometheus]
    logs:
      exporters: [debug, opensearch]
    profiles:
      exporters: [debug, otlp_grpc/firepit]
