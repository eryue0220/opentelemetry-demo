name: CodeQL analysis

on:
  workflow_call:
  schedule:
    - cron: "44 3 * * 4"  # every Thursday at 03:44 UTC
  workflow_dispatch:

permissions:
  contents: read  # required to checkout the repository

concurrency:
  group: codeql-analysis-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read  # required to scan GitHub Actions workflows
      contents: read  # required to checkout the repository
      security-events: write  # required to upload CodeQL SARIF to code scanning
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: none
          - language: csharp
            build-mode: none
          - language: go
            build-mode: manual
          - language: java-kotlin
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: ruby
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: '1.25.10'
          cache-dependency-path: |
            src/checkout/go.sum
            src/product-catalog/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Build checkout service
        if: matrix.language == 'go'
        working-directory: src/checkout
        run: go build ./...

      - name: Build product-catalog service
        if: matrix.language == 'go'
        working-directory: src/product-catalog
        run: go build ./...

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
